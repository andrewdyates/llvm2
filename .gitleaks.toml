title = "ai_template gitleaks config"

[extend]
# Use default gitleaks rules
useDefault = true

[allowlist]
description = "ai_template allowlist"

# Paths to skip (test fixtures, vendor code, etc.)
paths = [
    '''test/fixtures/''',
    '''tests/fixtures/''',
    '''vendor/''',
    '''third_party/''',
    '''node_modules/''',
    '''\.mypy_cache/''',
    '''__pycache__/''',
]

# Regex patterns for allowed secrets (e.g., test tokens, placeholders)
regexes = [
    '''EXAMPLE_''',
    '''TEST_''',
    '''PLACEHOLDER_''',
    '''sk-test-''',
    '''pk-test-''',
]

# Known commit hashes (false positives that look like secrets)
commits = []
