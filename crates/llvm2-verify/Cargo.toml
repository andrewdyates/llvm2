# llvm2-verify - Verification backend
#
# Author: Andrew Yates <ayates@dropbox.com>
# Copyright 2026 Dropbox, Inc. | License: Apache-2.0

[package]
name = "llvm2-verify"
description = "Verification backend for LLVM2 using SMT solving (z4)"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[features]
default = []
z4 = ["dep:z4"]  # Enable real z4 solver integration (in-process via Rust API)

[dependencies]
llvm2-ir = { workspace = true }
llvm2-lower = { workspace = true }
thiserror = { workspace = true }
# z4 dependency: use local path for development, switch to git dep for release.
# Local path assumes z4 repo is checked out at ~/z4/ (see CLAUDE.md).
# For worktree compatibility, use absolute-style relative path.
# z4 = { git = "https://github.com/dropbox-ai-prototypes/z4", optional = true }
z4 = { git = "https://github.com/dropbox-ai-prototypes/z4", optional = true }
