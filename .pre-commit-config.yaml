# .pre-commit-config.yaml
# ai_template pre-commit configuration
# See: https://pre-commit.com/
#
# Copyright 2026 Dropbox, Inc.
# Author: Andrew Yates
# Licensed under the Apache License, Version 2.0

default_install_hook_types: [pre-commit, commit-msg, pre-push]
default_stages: [pre-commit]

repos:
  # Standard file hygiene hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]

  # Python linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff
        args: [--fix, --config=pyproject.toml]
      - id: ruff-format

  # Python type checking (prevents bugs like #932 label type assumptions)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.1
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        additional_dependencies: [PyJWT, requests]
        pass_filenames: false

  # Markdown linting (#438)
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.20.0
    hooks:
      - id: markdownlint-cli2
        args: [--config, .markdownlint.jsonc]

  # Shell script formatting (shfmt) - #439
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        # -i 4: 4-space indent (matches .editorconfig)
        # -w: write changes in place
        args: [-i, '4', -w]

  # Shell script linting (using system shellcheck)
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]

  # Spell checking
  - repo: https://github.com/crate-ci/typos
    rev: v1.42.3
    hooks:
      - id: typos
        # Report-only mode (no auto-fix)
        args: [--force-exclude]

  # Secret scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  # ai_template custom checks (headers, authors, ignore detection)
  - repo: local
    hooks:
      - id: ai-template-custom
        name: ai_template custom checks
        entry: ai_template_scripts/pre-commit-hook.sh
        language: script
        pass_filenames: false

      - id: ai-template-commit-msg
        name: ai_template commit message hook
        entry: ai_template_scripts/commit-msg-hook.sh
        language: script
        stages: [commit-msg]
        pass_filenames: true

      - id: ai-template-pre-push
        name: ai_template claim validation
        entry: ai_template_scripts/pre-push-hook.sh
        language: script
        stages: [pre-push]
        pass_filenames: false
        always_run: true
