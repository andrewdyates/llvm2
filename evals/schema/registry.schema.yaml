# Andrew Yates <ayates@dropbox.com>
$schema: http://json-schema.org/draft-07/schema#
type: object
required:
  - id
  - version
  - description
  - owner
  - entrypoint
  - inputs
  - metrics
  - outputs
properties:
  id:
    type: string
    pattern: "^[a-z][a-z0-9-]*$"
    description: Kebab-case eval identifier
  version:
    type: integer
    minimum: 1
    description: Spec schema version
  description:
    type: string
    minLength: 1
  owner:
    type: string
    description: Contact email or team
  entrypoint:
    type: string
    description: "module:function or script path"
  inputs:
    type: object
    description: Dataset and parameters
  metrics:
    type: array
    items:
      type: string
  outputs:
    type: object
    required:
      - results_dir
    properties:
      results_dir:
        type: string
        description: "Path with {run_id} placeholder"
      logs_dir:
        type: string
