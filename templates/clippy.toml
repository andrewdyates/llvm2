# Clippy configuration for ayates_dbx Rust projects
#
# Copy to project root as clippy.toml or .clippy.toml
# Run: cargo clippy -- -D warnings
#
# Copyright 2026 Dropbox, Inc.
# Author: Andrew Yates <ayates@dropbox.com>

# Clippy lints for ayates_dbx Rust projects
# Note: warn/deny at top level is TOML array syntax - can only appear once per key
# To configure multiple lint groups, use Cargo.toml [lints.clippy] section instead

warn = [
    # Memory discipline - prevent OOM patterns
    "clippy::redundant_clone",          # .clone() when not needed
    "clippy::clone_on_ref_ptr",         # clone() on Arc/Rc
    "clippy::large_enum_variant",       # unboxed large variants
    "clippy::vec_init_then_push",       # Vec::new() then push vs with_capacity
    "clippy::unnecessary_to_owned",     # .to_vec()/.to_string() when ref works
    # Performance
    "clippy::needless_collect",         # collect() then iterate
    "clippy::manual_memcpy",            # loop copy vs copy_from_slice
    "clippy::inefficient_to_string",    # format!() vs to_string()
]

# Large enum variant threshold (bytes)
large-enum-variant-size-threshold = 64

# Correctness
deny = [
    "clippy::unwrap_used",              # use expect() with context
    "clippy::panic",                    # no panics in library code
]
